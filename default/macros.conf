# === Index macros (user-customizable) ===
[claude_index]
definition = (index=claude)
iseval = 0

[gemini_index]
definition = (index=gemini)
iseval = 0

[ai_all_indexes]
definition = (index=claude OR index=ai OR index=gemini OR index=openai OR index=vscode)
iseval = 0

# === Base filter macros ===
[claude_assistant_events]
definition = `claude_index` sourcetype="claude:code:session" type="assistant"
iseval = 0

[claude_all_session_events]
definition = `claude_index` (sourcetype="claude:code:session" OR sourcetype="claude:code:subagent")
iseval = 0

# === Token extraction (ccusage 4-token model) ===
[extract_tokens]
definition = eval input_tokens=coalesce('message.usage.input_tokens',0), \
  output_tokens=coalesce('message.usage.output_tokens',0), \
  cache_read=coalesce('message.usage.cache_read_input_tokens',0), \
  cache_created=coalesce('message.usage.cache_creation_input_tokens',0), \
  total_tokens=coalesce('message.usage.input_tokens',0)+coalesce('message.usage.output_tokens',0)+coalesce('message.usage.cache_read_input_tokens',0)+coalesce('message.usage.cache_creation_input_tokens',0)
iseval = 0

# === Cost calculation (model-aware) ===
[calculate_cost]
definition = `extract_tokens` \
  | eval model=coalesce('message.model',"unknown") \
  | eval cost_usd=case( \
      match(model,"claude-opus-4|claude-4-opus"), (input_tokens*15.0/1000000)+(output_tokens*75.0/1000000)+(cache_read*1.5/1000000)+(cache_created*18.75/1000000), \
      match(model,"claude-sonnet-4|claude-4-sonnet"), (input_tokens*3.0/1000000)+(output_tokens*15.0/1000000)+(cache_read*0.30/1000000)+(cache_created*3.75/1000000), \
      match(model,"claude.*haiku"), (input_tokens*0.25/1000000)+(output_tokens*1.25/1000000)+(cache_read*0.025/1000000)+(cache_created*0.3125/1000000), \
      1=1, (input_tokens*15.0/1000000)+(output_tokens*75.0/1000000)+(cache_read*1.5/1000000)+(cache_created*18.75/1000000))
iseval = 0

# === Tool extraction (with CIM Change fields) ===
[extract_tools]
definition = spath path="message.content{}" output=content_item \
  | mvexpand content_item \
  | spath input=content_item \
  | search type="tool_use" \
  | eval object=name, \
    object_path=coalesce('input.file_path','input.pattern','input.command','input.query'), \
    command=name
iseval = 0

# === Deduplication (ccusage pattern: messageId:requestId) ===
[dedup_messages]
definition = eval dedup_key='message.id'.":".requestId | dedup dedup_key
iseval = 0

# === Cache performance ===
[calculate_cache_pct]
definition = `extract_tokens` \
  | eval total_input=input_tokens+cache_read+cache_created \
  | where total_input>0 \
  | eval cache_hit_pct=round(cache_read/total_input*100, 1)
iseval = 0
