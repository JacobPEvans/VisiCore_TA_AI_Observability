# === Claude Code Session Data (primary telemetry) ===
[claude:code:session]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N%Z
MAX_TIMESTAMP_LOOKAHEAD = 30

# Flattened convenience fields (aligned with ccusage 4-token model)
EVAL-input_tokens = coalesce('message.usage.input_tokens', 0)
EVAL-output_tokens = coalesce('message.usage.output_tokens', 0)
EVAL-cache_read_tokens = coalesce('message.usage.cache_read_input_tokens', 0)
EVAL-cache_creation_tokens = coalesce('message.usage.cache_creation_input_tokens', 0)
EVAL-total_tokens = coalesce('message.usage.input_tokens',0) + coalesce('message.usage.output_tokens',0) + coalesce('message.usage.cache_read_input_tokens',0) + coalesce('message.usage.cache_creation_input_tokens',0)
EVAL-model = 'message.model'
EVAL-stop_reason = 'message.stop_reason'

# Deduplication key (ccusage pattern: messageId:requestId)
EVAL-dedup_key = 'message.id'.":".requestId

# CIM Base Fields (Web data model + standard)
EVAL-vendor = "anthropic"
EVAL-product = "claude_code"
EVAL-vendor_product = "anthropic_claude_code"
EVAL-app = "claude_code"
EVAL-action = type
FIELDALIAS-cim_dest = message.model AS dest
FIELDALIAS-cim_session_id = sessionId AS session_id

# OTel GenAI Semantic Convention Aliases
EVAL-gen_ai.provider.name = "anthropic"
EVAL-gen_ai.operation.name = "chat"
FIELDALIAS-otel_response_model = message.model AS gen_ai.response.model
FIELDALIAS-otel_conversation_id = sessionId AS gen_ai.conversation.id
FIELDALIAS-otel_input_tokens = message.usage.input_tokens AS gen_ai.usage.input_tokens
FIELDALIAS-otel_output_tokens = message.usage.output_tokens AS gen_ai.usage.output_tokens
FIELDALIAS-otel_cache_read = message.usage.cache_read_input_tokens AS gen_ai.usage.cache_read.input_tokens
FIELDALIAS-otel_cache_creation = message.usage.cache_creation_input_tokens AS gen_ai.usage.cache_creation.input_tokens
FIELDALIAS-otel_finish_reason = message.stop_reason AS gen_ai.response.finish_reasons

# === Claude Code Subagent Data ===
[claude:code:subagent]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-input_tokens = coalesce('message.usage.input_tokens', 0)
EVAL-output_tokens = coalesce('message.usage.output_tokens', 0)
EVAL-cache_read_tokens = coalesce('message.usage.cache_read_input_tokens', 0)
EVAL-cache_creation_tokens = coalesce('message.usage.cache_creation_input_tokens', 0)
EVAL-total_tokens = coalesce('message.usage.input_tokens',0) + coalesce('message.usage.output_tokens',0) + coalesce('message.usage.cache_read_input_tokens',0) + coalesce('message.usage.cache_creation_input_tokens',0)
EVAL-model = 'message.model'
EVAL-stop_reason = 'message.stop_reason'
EVAL-dedup_key = 'message.id'.":".requestId
EVAL-vendor = "anthropic"
EVAL-product = "claude_code"
EVAL-vendor_product = "anthropic_claude_code"
EVAL-app = "claude_code"
EVAL-action = type
